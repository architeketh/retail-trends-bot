name: Retail Trends – Build & Publish (Simple)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"   # daily at 09:00 UTC

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # --- Pipeline (minimal, reliable) ---
      - name: Fetch retail data
        run: python bot/fetch.py

      - name: Summarize data (writes summary.json + daily_summaries.json)
        run: python bot/summarize.py

      - name: Build weekly page (always writes site/weekly.html)
        run: python bot/weekly_summary.py

      - name: Build dashboard (index.html)
        run: python bot/infographic.py

      - name: Build stats page (always writes site/stats.html)
        run: python bot/stats_page.py

      - name: Build news sites page
        run: python bot/news_links_page.py

      # --- Sanity: stop deploy if a key page is missing ---
      - name: Verify output
        run: |
          ls -la site || true
          test -s site/index.html   || (echo "index.html missing" && exit 1)
          test -s site/weekly.html  || (echo "weekly.html missing or empty" && exit 1)
          test -s site/stats.html   || (echo "stats.html missing or empty" && exit 1)
          test -s site/news.html    || (echo "news.html missing or empty" && exit 1)
# 🔎 Debug: show what's in /site
- name: List site folder
  run: |
    echo "--- site contents ---"
    ls -la site || true
    echo "---------------------"

# 🛡️ Guardrail: create placeholders if generation failed
- name: Guard: ensure weekly.html and stats.html exist
  run: |
    mkdir -p site
    if [ ! -s site/weekly.html ]; then
      cat > site/weekly.html <<'HTML'
<!doctype html><html><head><meta charset="utf-8"><title>Weekly (placeholder)</title></head>
<body><h1>Weekly (placeholder)</h1><p>This placeholder was added by the workflow because the generator didn't write weekly.html this run.</p>
<p>Links: <a href="index.html">Dashboard</a> · <a href="stats.html">Stats</a></p></body></html>
HTML
    fi
    if [ ! -s site/stats.html ]; then
      cat > site/stats.html <<'HTML'
<!doctype html><html><head><meta charset="utf-8"><title>Stats (placeholder)</title></head>
<body><h1>Stats (placeholder)</h1><p>This placeholder was added by the workflow because the generator didn't write stats.html this run.</p>
<p>Links: <a href="index.html">Dashboard</a> · <a href="weekly.html">Weekly</a></p></body></html>
HTML
    fi
    echo "--- final site contents ---"
    ls -la site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
