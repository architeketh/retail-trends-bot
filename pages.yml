name: Deploy Retail Trends Bot

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  # Optional: run daily at 09:00 UTC
  # schedule:
  #   - cron: "0 9 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ---- Build the single-page site (no more 404s) ----
      - name: Fetch retail data
        run: python bot/fetch.py

      - name: Summarize data
        run: |
          python bot/summarize.py
          echo "::group::summary.json"; head -n 60 bot/data/summary.json || true; echo "::endgroup::"
          echo "::group::archive keys"; python - <<'PY'
import json, os
p="bot/data/daily_summaries.json"
if os.path.exists(p):
    d=json.load(open(p,encoding="utf-8"))
    print("days:", ", ".join(sorted(d.keys())[-10:]) or "(none)")
else:
    print("daily_summaries.json not found")
PY
          echo "::endgroup::"

      - name: Build single-page site (index.html only)
        run: |
          python bot/site_builder.py
          echo "::group::index.html head"; head -n 60 site/index.html || true; echo "::endgroup::"

      - name: Verify output
        run: |
          test -s site/index.html || (echo "index.html missing" && exit 1)

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
