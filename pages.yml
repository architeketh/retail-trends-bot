name: Retail Trends - Build & Publish (GitHub Pages)

on:
  schedule:
    - cron: "0 12 * * *"   # daily at 12:00 UTC (~07:00 America/Chicago during DST)
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python bot/fetch.py
      - run: python bot/summarize.py
      - run: python bot/infographic.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
    - name: Build stats page
      run: python bot/stats_page.py
          - name: Build news sites page
      run: python bot/news_links_page.py

