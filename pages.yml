name: Retail Trends – Build & Publish (Bullet-proof)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"    # daily 09:00 UTC

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch retail data
        run: python bot/fetch.py

      - name: Summarize data (writes summary.json + daily_summaries.json)
        run: |
          python bot/summarize.py
          echo "::group::DATA files"; ls -la bot/data || true; echo; head -n 50 bot/data/summary.json || true; echo "::endgroup::"

      - name: Build weekly page (writes site/weekly.html)
        run: |
          python bot/weekly_summary.py
          echo "::group::WEEKLY page head"; head -n 30 site/weekly.html || true; echo "::endgroup::"

      - name: Build dashboard (index.html)
        run: python bot/infographic.py

      - name: Build stats page (writes site/stats.html)
        run: |
          python bot/stats_page.py
          echo "::group::STATS page head"; head -n 30 site/stats.html || true; echo "::endgroup::"

      - name: Build news sites page
        run: python bot/news_links_page.py

      # Show what's actually in `site/`
      - name: List site folder
        run: |
          echo "--- site contents ---"
          find site -maxdepth 2 -type f -print | sort
          echo "---------------------"

      # Guard: if anything is missing/empty, create a tiny placeholder so Pages never 404s
      - name: Guard: ensure weekly.html and stats.html exist
        run: |
          mkdir -p site
          [ -s site/weekly.html ] || cat > site/weekly.html <<'HTML'
<!doctype html><html><head><meta charset="utf-8"><title>Weekly (guard)</title></head>
<body><h1>Weekly (guard)</h1><p>Generated by workflow guard. Generator didn't output weekly.html this run.</p>
<p><a href="index.html">Dashboard</a> • <a href="stats.html">Stats</a></p></body></html>
HTML
          [ -s site/stats.html ] || cat > site/stats.html <<'HTML'
<!doctype html><html><head><meta charset="utf-8"><title>Stats (guard)</title></head>
<body><h1>Stats (guard)</h1><p>Generated by workflow guard. Generator didn't output stats.html this run.</p>
<p><a href="index.html">Dashboard</a> • <a href="weekly.html">Weekly</a></p></body></html>
HTML
          echo "--- final site contents ---"
          find site -maxdepth 2 -type f -print | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
