name: Retail Trends – Build & Publish

on:
  workflow_dispatch:   # allow manual run
  schedule:
    - cron: "0 9 * * *"   # run daily at 09:00 UTC

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ---- Bot pipeline ----
      - name: Fetch retail data
        run: python bot/fetch.py

      - name: Summarize data
        run: python bot/summarize.py

      - name: Build weekly AI summary page
        run: python bot/weekly_summary.py

      - name: Build infographic dashboard (index.html)
        run: python bot/infographic.py

      - name: Build stats page (stats.html)
        run: python bot/stats_page.py

      - name: Build news sites page (news.html)
        run: python bot/news_links_page.py

      # ---- Sanity check: make sure pages exist ----
      - name: Verify output files
        run: |
          ls -la site || true
          test -s site/index.html   || (echo "index.html missing" && exit 1)
          test -s site/weekly.html  || (echo "weekly.html missing or empty" && exit 1)
          test -s site/stats.html   || (echo "stats.html missing or empty" && exit 1)
          test -s site/news.html    || (echo "news.html missing or empty" && exit 1)

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
