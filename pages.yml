name: Retail Trends – Build & Publish

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"  # daily at 09:00 UTC

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # --- Your pipeline ---
      - name: Fetch retail data
        run: python bot/fetch.py
        
      - name: Discover new publisher sites
      run: python bot/discover_sites.py


      - name: Summarize data
        run: python bot/summarize.py

      - name: Build infographic dashboard (index.html)
        run: python bot/infographic.py

      - name: Build stats page (stats.html)
        run: python bot/stats_page.py

      - name: Build news sites page (news.html)
        run: python bot/news_links_page.py

      # --- Sanity check: prove the files exist before upload ---
      - name: Verify site output
        run: |
          echo "Tree of site/:"
          ls -la site || true
          echo "Tree of site/assets:"
          ls -la site/assets || true

          echo "First lines of index.html (if present):"
          sed -n '1,5p' site/index.html || true

          # HARD checks (fail the build if missing):
          [ -f site/index.html ] || (echo "ERROR: site/index.html missing" && exit 1)
          [ -f site/stats.html ] || (echo "ERROR: site/stats.html missing" && exit 1)
          [ -f site/news.html ]  || (echo "ERROR: site/news.html missing"  && exit 1)

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Fetch retail data
      run: python bot/fetch.py

    - name: Discover new publisher sites
      run: python bot/discover_sites.py

    - name: Summarize data
      run: python bot/summarize.py

     - name: Build weekly AI summary page
      run: python bot/weekly_summary.py

    - name: Build infographic dashboard (index.html)
      run: python bot/infographic.py

    - name: Build stats page (stats.html)
      run: python bot/stats_page.py

    - name: Build news sites page (news.html)
      run: python bot/news_links_page.py

      env:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}


