summary:
  method: "extractive"     # keep simple + free; can switch to "openai" later
  max_items: 40            # consider more items now that we have more sources
  target_words: 220

infographic:
  title: "Retail Trends — Auto Report"
  output_image: "site/assets/retail_trends_infographic.png"
  brands_image: "site/assets/retail_brands.png"
  top_n_brands: 14         # show more brands

website:
  title: "Retail Trends Daily"
  description: "Automated snapshot of retail signals: sales, pricing, promotions, foot traffic, ecommerce, and macro updates."
